services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  social-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_URL: ${AUTH_URL}
      AUTH_SESSION_RESOLVE_ENDPOINT: ${AUTH_SESSION_RESOLVE_ENDPOINT}
      CONTENT_URL: ${CONTENT_URL}
      CONTENT_RECIPE_ENDPOINT_TEMPLATE: ${CONTENT_RECIPE_ENDPOINT_TEMPLATE}
      CONTENT_COLLECTION_ENDPOINT_TEMPLATE: ${CONTENT_COLLECTION_ENDPOINT_TEMPLATE}
      CONTENT_VALIDATION_ENABLED: ${CONTENT_VALIDATION_ENABLED}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -fsS http://localhost:3000/actuator/health | grep -q UP',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - '${APP_PORT}:3000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  postgres_data:
