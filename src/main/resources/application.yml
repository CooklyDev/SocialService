server:
  port: ${PORT:3000}

spring:
  application:
    name: social-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/social_service}
    username: ${SPRING_DATASOURCE_USERNAME:social_service}
    password: ${SPRING_DATASOURCE_PASSWORD:social_service}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /docs

cookly:
  auth:
    url: ${AUTH_URL:http://localhost:8080}
    session-resolve-endpoint: ${AUTH_SESSION_RESOLVE_ENDPOINT:/api/v1/resolve}
  content:
    url: ${CONTENT_URL:http://localhost:3000}
    recipe-endpoint-template: ${CONTENT_RECIPE_ENDPOINT_TEMPLATE:/recipes/{id}}
    collection-endpoint-template: ${CONTENT_COLLECTION_ENDPOINT_TEMPLATE:/collections/{id}}
    validation-enabled: ${CONTENT_VALIDATION_ENABLED:true}
